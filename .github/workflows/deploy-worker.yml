# Deploy the per-ecosystem age-gate Workers to JFrog.
#
# Triggers:
#   - push to main changing a Worker source, the allowlist (whose generated block
#     lives inside the Worker sources), or a tracked deploy manifest. The intake
#     flow lands these via a reviewed PR, so a merge is an approved change. A push
#     deploys EVERY tracked test Worker (matrix below).
#   - workflow_dispatch, to deploy a single chosen target on demand.
#
# Deploy targets are manifest-driven. Each deployable Worker is a tracked manifest
# at deploy/<key>/manifest.json, whose `name` is the Worker key and which is the
# source of truth for scope (repoKeys), debug, and enabled. The Worker SOURCE is
# derived from the key prefix: `<eco>-age-gate*` -> workers/<eco>-age-gate.before-
# remote-download.ts (npm-* -> the npm Worker, pypi-* -> the PyPI Worker). Adding
# an ecosystem = adding a fragment + a generated Worker + a manifest, and listing
# its test key in the push matrix below.
#
# Required GitHub secrets (access-token auth):
#   JF_URL           - JFrog platform base URL, e.g. https://example.jfrog.io
#   JF_ACCESS_TOKEN  - JFrog access token with permission to deploy these Workers

name: Deploy Worker

on:
  push:
    branches: [main]
    paths:
      - "workers/**"
      - "allowlist.json"
      - "deploy/**"
      - ".github/workflows/deploy-worker.yml"
  workflow_dispatch:
    inputs:
      worker:
        description: "Worker key to deploy (must have deploy/<worker>/manifest.json)"
        type: string
        required: false
        default: npm-age-gate-test

permissions:
  contents: read

env:
  # The post-deploy smoke gate (docker/gate-test.sh) drives the dedicated npm
  # test repos, and the harness implements live pulls for npm only. It runs only
  # for this key, so deploying any other (PyPI, or a prod) target does not run a
  # suite that target cannot satisfy.
  SMOKE_WORKER_KEY: npm-age-gate-test

jobs:
  # Pick the set of Worker keys to deploy: the single dispatch input on demand,
  # or every tracked test Worker on a push to main.
  select:
    runs-on: ubuntu-latest
    outputs:
      keys: ${{ steps.pick.outputs.keys }}
    steps:
      - name: Select targets
        id: pick
        env:
          EVENT: ${{ github.event_name }}
          INPUT_WORKER: ${{ inputs.worker }}
          VAR_WORKER_KEY: ${{ vars.WORKER_KEY }}
        run: |
          set -euo pipefail
          if [ "$EVENT" = "workflow_dispatch" ]; then
            key="${INPUT_WORKER:-${VAR_WORKER_KEY:-npm-age-gate-test}}"
            keys="[\"${key}\"]"
          else
            keys='["npm-age-gate-test","pypi-age-gate-test"]'
          fi
          echo "keys=${keys}" >> "$GITHUB_OUTPUT"
          echo "Selected targets: ${keys}"

  deploy:
    needs: select
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        key: ${{ fromJSON(needs.select.outputs.keys) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Resolve deploy target
        id: target
        env:
          KEY: ${{ matrix.key }}
        run: |
          set -euo pipefail
          manifest="deploy/${KEY}/manifest.json"
          if [ ! -f "$manifest" ]; then
            echo "::error::No tracked manifest at ${manifest}. Add it before deploying '${KEY}'." >&2
            exit 1
          fi
          # Worker source is derived from the key prefix (the ecosystem).
          eco="${KEY%%-*}"
          source="workers/${eco}-age-gate.before-remote-download.ts"
          if [ ! -f "$source" ]; then
            echo "::error::No worker source ${source} for key '${KEY}' (prefix '${eco}')." >&2
            exit 1
          fi
          echo "manifest=${manifest}" >> "$GITHUB_OUTPUT"
          echo "source=${source}" >> "$GITHUB_OUTPUT"
          echo "Deploying worker '${KEY}' from ${manifest} using source ${source}"

      - name: Guard — required secrets present
        run: |
          if [ -z "${{ secrets.JF_URL }}" ] || [ -z "${{ secrets.JF_ACCESS_TOKEN }}" ]; then
            echo "::error::JF_URL and JF_ACCESS_TOKEN secrets must be set for deploy." >&2
            exit 1
          fi

      # Gate 1: offline unit tests (zero deps). Includes the codegen drift guards
      # (build-workers.mjs --check and build-allowlist.mjs --check), which fail if
      # any generated Worker has drifted from the template/fragments or
      # allowlist.json.
      - name: Unit tests
        run: npm test

      - name: Setup JFrog CLI
        uses: jfrog/setup-jfrog-cli@v4
        env:
          JF_URL: ${{ secrets.JF_URL }}
          JF_ACCESS_TOKEN: ${{ secrets.JF_ACCESS_TOKEN }}

      # .jfrog-worker/ is gitignored; assemble the CLI worker project from the
      # ecosystem's committed Worker source + the tracked manifest (the manifest,
      # not `jf worker init`, controls scope).
      - name: Assemble worker project
        env:
          WORKER_KEY: ${{ matrix.key }}
          MANIFEST: ${{ steps.target.outputs.manifest }}
          WORKER_SOURCE: ${{ steps.target.outputs.source }}
        run: |
          set -euo pipefail
          work_dir=".jfrog-worker/${WORKER_KEY}"
          mkdir -p "$work_dir"
          cp "${WORKER_SOURCE}" "${work_dir}/worker.ts"
          cp "${MANIFEST}" "${work_dir}/manifest.json"

      # Gate 2: sandbox dry-run on the live platform. `jf worker test-run` exits
      # non-zero only when the Worker crashes (executionStatus != STATUS_SUCCESS);
      # a clean STOP/PROCEED exits 0. The fixture is an npm path: for the npm
      # Worker it drives the fail-closed STOP case, for the PyPI Worker it drives
      # the unparseable-path STOP — either way it proves the assembled source
      # executes end to end.
      - name: Test-run (sandbox dry-run)
        working-directory: .jfrog-worker/${{ matrix.key }}
        run: jf worker test-run @"${GITHUB_WORKSPACE}/test/fixtures/before-remote-download-event.json"

      - name: Deploy
        working-directory: .jfrog-worker/${{ matrix.key }}
        run: jf worker deploy

      - name: Verify deployed
        run: jf worker list --format json

      # Gate 3: post-deploy live smoke test (npm only — see SMOKE_WORKER_KEY). `jf`
      # is already configured against the platform (setup-jfrog-cli above), so the
      # harness runs on the runner directly — no container. It pulls uncached
      # packages through the test virtual and asserts the deployed Worker blocks a
      # fresh version, allows an aged one, and honors each npm allowlist entry; it
      # exits non-zero on any mismatch. Repo keys are overridable via GATE_* repo
      # variables.
      - name: Smoke test (live gate)
        if: matrix.key == env.SMOKE_WORKER_KEY
        env:
          GATE_VIRTUAL: ${{ vars.GATE_VIRTUAL || 'appsec-test' }}
          GATE_REMOTE: ${{ vars.GATE_REMOTE || 'npm-appsec-remote-test' }}
          GATE_CACHE: ${{ vars.GATE_CACHE || 'npm-appsec-remote-test-cache' }}
          GATE_ALLOWLIST: ${{ github.workspace }}/allowlist.json
        run: bash docker/gate-test.sh suite
